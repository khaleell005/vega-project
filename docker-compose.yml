# docker-compose.yml — Full application stack (pnpm monorepo)
#
# Usage:  docker compose up --build
#
# Remap host ports via .env next to this file:
#   POSTGRES_HOST_PORT=5433  REDIS_HOST_PORT=6380  APP_HOST_PORT=3000 ...

services:
  redis:
    image: redis:7
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rate_limiter
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - rate-limiter-pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${APP_HOST_PORT:-3000}:3000"
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: rate_limiter
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rate_limiter
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        VITE_API_BASE: "http://localhost:${APP_HOST_PORT:-3000}"
    ports:
      - "${DASHBOARD_HOST_PORT:-5173}:80"
    depends_on:
      - app

  test-client:
    build: ./test-client
    ports:
      - "${TEST_CLIENT_HOST_PORT:-8080}:80"
    depends_on:
      - app

volumes:
  rate-limiter-pgdata:
